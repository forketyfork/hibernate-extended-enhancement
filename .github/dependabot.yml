version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    ignore:
      # Extended bytecode enhancement is deprecated in Hibernate 7.x, so this
      # project stays on the 6.x line. Block anything from 7.0 onwards.
      - dependency-name: "org.hibernate:hibernate-core"
        versions: [">=7.0.0"]
      - dependency-name: "org.hibernate.orm.tooling:hibernate-enhance-maven-plugin"
        versions: [">=7.0.0"]
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      all-actions:
        patterns:
          - "*"
